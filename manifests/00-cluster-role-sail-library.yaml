# ClusterRole for Sail Library-based Istio installation.
# This role grants the cluster-ingress-operator permissions required to install
# and manage Istio via the Sail Library for Gateway API support.
#
# RBAC Context:
# The Sail Operator has its own ClusterRole defined in the Helm chart at
# https://github.com/istio-ecosystem/sail-operator/blob/main/chart/templates/rbac/role.yaml
# and the Sail Library provides install.LibraryRBACRules() in
# pkg/install/rbac.go for consumers to generate required permissions.
#
# Why We Define a Custom ClusterRole Instead of Using LibraryRBACRules():
# LibraryRBACRules() is overly broad for our Gateway API use case. We provide a
# curated subset with only the permissions needed for our integration.
#
# ClusterRole Escalation:
# When the Sail Library creates ClusterRoles for istiod service accounts, it needs
# either (a) a superset of all permissions being granted, or (b) the 'escalate' verb.
# Currently, Sail Operator uses escalate, and we follow the same pattern. We grant
# 'escalate' on rbac.authorization.k8s.io resources to allow creating ClusterRoles
# with permissions that CIO itself holds.
#
# TODO - Future Improvements:
# 1. Consider removing 'escalate' and instead explicitly grant istiod the exact
#    permissions it needs (from istiod Helm chart ClusterRoles) as a superset here
# 2. Add automated generation/verification against install.LibraryRBACRules() to
#    ensure we stay in sync with upstream Sail Library requirements while
#    maintaining our custom additions and restrictions
kind: ClusterRole
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: openshift-ingress-operator-sail-library
  annotations:
    capability.openshift.io/name: Ingress
    release.openshift.io/feature-gate: GatewayAPIWithoutOLM
    include.release.openshift.io/ibm-cloud-managed: "true"
    include.release.openshift.io/self-managed-high-availability: "true"
    include.release.openshift.io/single-node-developer: "true"
rules:
# Gateway autoscaling - Sail Library can potentially create HPAs
- apiGroups:
  - autoscaling
  resources:
  - horizontalpodautoscalers
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch

# RBAC management - Sail Library creates and manages ClusterRoles/Roles for istiod service accounts
- apiGroups:
  - rbac.authorization.k8s.io
  resources:
  - clusterroles
  - clusterrolebindings
  - roles
  - rolebindings
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch

# RBAC escalation - 'bind' and 'escalate' allow creating ClusterRoles with permissions that CIO holds
- apiGroups:
  - rbac.authorization.k8s.io
  resources:
  - clusterroles
  - roles
  verbs:
  - bind
  - escalate

# Admission webhooks - Sail Library creates webhook configurations from istiod Helm chart
- apiGroups:
  - admissionregistration.k8s.io
  resources:
  - mutatingwebhookconfigurations
  - validatingadmissionpolicies
  - validatingadmissionpolicybindings
  - validatingwebhookconfigurations
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
