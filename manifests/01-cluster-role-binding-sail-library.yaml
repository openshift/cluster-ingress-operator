# Binds the Sail Library cluster role to the operator's Service Account.
# This grants the cluster-ingress-operator permissions required to install
# and manage Istio via the Sail Library for Gateway API support.
kind: ClusterRoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: openshift-ingress-operator-sail-library
  annotations:
    capability.openshift.io/name: Ingress
    release.openshift.io/feature-gate: GatewayAPIWithoutOLM
    include.release.openshift.io/ibm-cloud-managed: "true"
    include.release.openshift.io/self-managed-high-availability: "true"
    include.release.openshift.io/single-node-developer: "true"
subjects:
- kind: ServiceAccount
  name: ingress-operator
  namespace: openshift-ingress-operator
roleRef:
  kind: ClusterRole
  apiGroup: rbac.authorization.k8s.io
  name: openshift-ingress-operator-sail-library
