apiVersion: apps/v1
kind: Deployment
metadata:
  name: ingress-operator
  namespace: openshift-ingress-operator
  annotations:
    capability.openshift.io/name: Ingress
    config.openshift.io/inject-proxy: ingress-operator
    include.release.openshift.io/self-managed-high-availability: "true"
    include.release.openshift.io/single-node-developer: "true"
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      name: ingress-operator
  template:
    metadata:
      annotations:
        target.workload.openshift.io/management: '{"effect": "PreferredDuringScheduling"}'
        openshift.io/required-scc: restricted-v2
      labels:
        name: ingress-operator
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      nodeSelector:
        kubernetes.io/os: linux
        node-role.kubernetes.io/master: ""
      tolerations:
      - key: "node-role.kubernetes.io/master"
        operator: "Exists"
        effect: "NoSchedule"
      - key: "node.kubernetes.io/unreachable"
        operator: "Exists"
        effect: "NoExecute"
        tolerationSeconds: 120
      - key: "node.kubernetes.io/not-ready"
        operator: "Exists"
        effect: "NoExecute"
        tolerationSeconds: 120
      serviceAccountName: ingress-operator
      priorityClassName: system-cluster-critical
      containers:
        - name: ingress-operator
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          terminationMessagePolicy: FallbackToLogsOnError
          imagePullPolicy: IfNotPresent
          image: openshift/origin-cluster-ingress-operator:latest
          command:
          - ingress-operator
          - start
          - --namespace
          - "$(WATCH_NAMESPACE)"
          - --image
          - "$(IMAGE)"
          - --haproxy-image
          - "2.8=$(HAPROXY_28_IMAGE)"
          - --haproxy-image
          - "3.2=$(HAPROXY_32_IMAGE)"
          - --default-haproxy-version
          - "$(DEFAULT_HAPROXY_VERSION)"
          - --canary-image
          - "$(CANARY_IMAGE)"
          - --release-version
          - "$(RELEASE_VERSION)"
          - --gateway-api-operator-catalog
          - "$(GATEWAY_API_OPERATOR_CATALOG)"
          - --gateway-api-operator-channel
          - "$(GATEWAY_API_OPERATOR_CHANNEL)"
          - --gateway-api-operator-version
          - "$(GATEWAY_API_OPERATOR_VERSION)"
          - --istio-version
          - "$(ISTIO_VERSION)"
          - --metrics-bind-addr
          - :9393
          - --metrics-cert-dir
          - /etc/tls/metrics
          env:
            - name: RELEASE_VERSION
              value: "0.0.1-snapshot"
            - name: WATCH_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: IMAGE
              value: openshift/origin-haproxy-router:v4.0
            - name: HAPROXY_28_IMAGE
              value: openshift/origin-haproxy:v2.8
            - name: HAPROXY_32_IMAGE
              value: openshift/origin-haproxy:v3.2
            - name: DEFAULT_HAPROXY_VERSION
              value: "3.2"
            - name: CANARY_IMAGE
              value: openshift/origin-cluster-ingress-operator:latest
            - name: GATEWAY_API_OPERATOR_CATALOG
              value: redhat-operators
            - name: GATEWAY_API_OPERATOR_CHANNEL
              value: stable
            - name: GATEWAY_API_OPERATOR_VERSION
              value: servicemeshoperator3.v3.4.0
            - name: ISTIO_VERSION
              value: v1.28-latest
          ports:
          - containerPort: 9393
            name: metrics
          resources:
            requests:
              cpu: 10m
              memory: 56Mi
          volumeMounts:
          - name: trusted-ca
            mountPath: /etc/pki/ca-trust/extracted/pem
            readOnly: true
          - name: bound-sa-token
            mountPath: /var/run/secrets/openshift/serviceaccount
            readOnly: true
          - name: metrics-tls
            mountPath: /etc/tls/metrics
            readOnly: true
      volumes:
      - name: metrics-tls
        secret:
          secretName: metrics-tls
      - name: trusted-ca
        configMap:
          name: trusted-ca
          items:
            - key: ca-bundle.crt
              path: tls-ca-bundle.pem
      # This service account token can be used to provide identity outside the cluster.
      # For example, this token can be used with AssumeRoleWithWebIdentity to authenticate with AWS using IAM OIDC provider and STS.
      - name: bound-sa-token
        projected:
          sources:
          - serviceAccountToken:
              path: token
              audience: openshift
